# nightshift rulebook — human-owned governance (copy to rulebook.yaml and edit).
# Hard prohibitions (no force-push, no deletes, branch-only) live in the hook,
# NOT here (hook-spec.md). This file is soft governance + knobs.

branch_prefix: nightshift/

limits:
  # The ONLY throughput cap: max OPEN (unmerged) nightshift/* branches allowed to exist at once,
  # across all repos. NOT a per-night count. Merge/close a branch and a slot frees up immediately, so
  # if you review continuously it runs all night; if you stop, it fills to this many and stops.
  max_open_branches: 2
  max_files_per_change: 15       # SOFT — guidance to the agent, not a hard reject
  max_lines_per_change: 400      # SOFT — a bigger change is fine if it's one coherent improvement

repos:
  - path: /absolute/path/to/your/repo
    mode: findings-only          # start here; graduate to branch-fix by editing this (the trust-ramp)
  # - path: /absolute/path/to/another
  #   mode: branch-fix           # full loop: Explore -> Fix<->Review -> push a nightshift/* branch
